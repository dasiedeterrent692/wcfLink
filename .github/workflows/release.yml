name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  GO_VERSION: "1.25.4"
  NODE_VERSION: "20"
  WAILS_VERSION: "v2.11.0"
  APP_NAME: "wcfLink"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-14
            asset_name: wcfLink-${{ github.ref_name }}-darwin-arm64.zip
          - name: macOS amd64
            os: macos-15-intel
            asset_name: wcfLink-${{ github.ref_name }}-darwin-amd64.zip
          - name: Windows amd64
            os: windows-latest
            asset_name: wcfLink-${{ github.ref_name }}-windows-amd64.zip
          - name: Linux amd64
            os: ubuntu-22.04
            asset_name: wcfLink-${{ github.ref_name }}-linux-amd64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Add Wails to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build desktop app
        run: wails build -clean

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "build/bin/${APP_NAME}.app" "dist/${{ matrix.asset_name }}"

      - name: Package Linux app
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          tar -czf "dist/${{ matrix.asset_name }}" -C build/bin "${APP_NAME}"

      - name: Package Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "build/bin/${env:APP_NAME}.exe" -DestinationPath "dist/${{ matrix.asset_name }}" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
